name: mobileflow
description: "MobileFlow — phone-to-desktop AI coding assistant"
publish_to: 'none'
version: 0.1.1+1
repository: https://github.com/mobileflow-dev/mobileflow

environment:
  sdk: ^3.3.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: any
  web_socket_channel: ^3.0.0
  flutter_markdown: ^0.7.4
  provider: ^6.1.0
  google_fonts: ^6.1.0
  flutter_highlight: ^0.7.0
  highlight: ^0.7.0
  re_highlight: ^0.0.3
  isolate_manager: ^4.1.5+1
  photo_view: ^0.15.0
  xterm:
    path: packages/xterm
  image_picker: ^1.0.7
  speech_to_text: ^7.0.0
  record: ^6.0.0
  url_launcher: ^6.2.0
  pinenacl: ^0.6.0
  flutter_secure_storage: ^9.2.4
  shared_preferences: ^2.2.0
  logging: ^1.3.0
  markdown: ^7.2.2
  flutter_inappwebview: ^6.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  generate: true
  uses-material-design: true

<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MobileFlow — Run Configurations</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdn.jsdelivr.net/npm/daisyui@4.12.14/dist/full.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/vendor/xterm.min.css">
  <script src="/vendor/xterm.min.js"></script>
  <script src="/vendor/addon-fit.min.js"></script>
  <script src="/i18n.js"></script>
  <script>
    tailwind.config = { darkMode: 'class' }
  </script>
  <style>
    body { background: #0f1019; min-height: 100vh; }
    .config-item.active { background: rgba(67,230,195,0.08); border-color: rgba(67,230,195,0.3); }
    .status-dot { width: 8px; height: 8px; border-radius: 50%; }
    .status-dot.running { background: #3ddb8c; animation: pulse 1.2s infinite alternate; }
    .status-dot.starting { background: #ffb454; animation: pulse 1.2s infinite alternate; }
    @keyframes pulse { from { opacity: 0.5; } to { opacity: 1; } }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #333; border-radius: 3px; }
    .xterm { height: 100% !important; }
  </style>
</head>
<body class="dark">
  <!-- Navbar -->
  <div class="navbar bg-base-200 border-b border-base-300 px-4 min-h-[48px]">
    <div class="flex-1"><span class="text-sm font-bold text-emerald-400">MobileFlow Agent</span></div>
    <div class="flex-none gap-2">
      <a href="/" class="btn btn-ghost btn-sm text-xs">Home</a>
      <button class="btn btn-primary btn-sm text-xs">Run Config</button>
    </div>
  </div>

  <!-- Main 3-column layout -->
  <div class="flex" style="height:calc(100vh - 48px);">
    <!-- Left: Config list -->
    <aside class="w-64 min-w-[220px] bg-base-200 border-r border-base-300 flex flex-col">
      <div class="flex items-center justify-between px-4 py-3 border-b border-base-300">
        <h3 class="text-sm font-semibold text-base-content">Configurations</h3>
        <button id="btn-add" class="btn btn-circle btn-ghost btn-xs text-emerald-400 text-lg">+</button>
      </div>
      <div id="config-list" class="flex-1 overflow-y-auto p-2 space-y-1">
        <div class="text-center text-xs text-base-content/50 py-8">Loading...</div>
      </div>
    </aside>

    <!-- Center: Editor -->
    <section class="flex-1 overflow-y-auto p-6" id="editor-panel">
      <div id="editor-empty" class="flex items-center justify-center h-full text-base-content/40 text-sm">
        Select a configuration or click + to create one.
      </div>
      <div id="editor-form" class="hidden max-w-lg space-y-4">
        <div class="form-control">
          <label class="label"><span class="label-text text-xs uppercase tracking-wider opacity-60">Name</span></label>
          <input type="text" id="f-name" class="input input-bordered input-sm bg-base-300 font-mono" placeholder="My Dev Server">
        </div>
        <div class="form-control">
          <label class="label"><span class="label-text text-xs uppercase tracking-wider opacity-60">Command</span></label>
          <textarea id="f-command" class="textarea textarea-bordered bg-base-300 font-mono text-sm" rows="2" placeholder="npm run dev"></textarea>
        </div>
        <div class="form-control">
          <label class="label"><span class="label-text text-xs uppercase tracking-wider opacity-60">Working Directory</span></label>
          <input type="text" id="f-workdir" class="input input-bordered input-sm bg-base-300 font-mono" placeholder="(project root)">
        </div>
        <div class="form-control hidden" id="field-url">
          <label class="label"><span class="label-text text-xs uppercase tracking-wider opacity-60">Preview URL</span></label>
          <input type="text" id="f-url" class="input input-bordered input-sm bg-base-300 font-mono" placeholder="http://localhost:3000">
        </div>
        <div class="form-control hidden" id="field-host">
          <label class="label"><span class="label-text text-xs uppercase tracking-wider opacity-60">Host Header</span></label>
          <input type="text" id="f-host" class="input input-bordered input-sm bg-base-300 font-mono" placeholder="(derived from URL)">
        </div>
        <div class="form-control">
          <label class="label"><span class="label-text text-xs uppercase tracking-wider opacity-60">Environment Variables</span></label>
          <div id="env-list" class="space-y-1"></div>
          <button id="btn-add-env" class="btn btn-ghost btn-xs text-emerald-400 mt-1 self-start">+ Add Variable</button>
        </div>
        <div class="form-control">
          <label class="label"><span class="label-text text-xs uppercase tracking-wider opacity-60">Before-Run Tasks</span></label>
          <div id="task-list" class="space-y-1"></div>
          <button id="btn-add-task" class="btn btn-ghost btn-xs text-emerald-400 mt-1 self-start">+ Add Task</button>
        </div>
        <div class="space-y-2">
          <div class="flex items-center justify-between">
            <span class="text-sm text-base-content/70">Allow Parallel</span>
            <input type="checkbox" id="t-parallel" class="toggle toggle-sm toggle-primary">
          </div>
          <div class="flex items-center justify-between hidden" id="row-autorefresh">
            <span class="text-sm text-base-content/70">Auto-Refresh</span>
            <input type="checkbox" id="t-autorefresh" class="toggle toggle-sm toggle-primary">
          </div>
        </div>
        <div class="flex gap-2 pt-4 border-t border-base-300">
          <button id="btn-run" class="btn btn-success btn-sm gap-1">&#9654; Run</button>
          <button id="btn-stop" class="btn btn-warning btn-sm gap-1 hidden">&#9632; Stop</button>
          <button id="btn-delete" class="btn btn-error btn-sm btn-outline">Delete</button>
        </div>
      </div>
    </section>

    <!-- Resize handle -->
    <div id="resize-handle" style="width:5px;cursor:col-resize;background:transparent;transition:background 0.15s;flex-shrink:0;" onmouseover="this.style.background='rgba(67,230,195,0.3)'" onmouseout="this.style.background='transparent'"></div>

    <!-- Right: Terminal output -->
    <aside id="output-panel" style="width:380px;min-width:200px;background:#0d0e17;border-left:1px solid #2a2b3e;display:flex;flex-direction:column;flex-shrink:0;">
      <div class="flex items-center justify-between px-4 py-3 border-b border-base-300">
        <h3 class="text-sm font-semibold text-base-content/80">Output</h3>
        <button id="btn-clear" class="btn btn-ghost btn-xs text-base-content/40 hover:text-base-content">Clear</button>
      </div>
      <div id="terminal-container" class="flex-1 overflow-hidden p-1"></div>
      <div id="output-status" class="px-4 py-2 border-t border-base-300 text-xs text-base-content/40 hidden"></div>
    </aside>
  </div>

  <!-- Type selection modal (DaisyUI dialog) -->
  <dialog id="type-dialog" class="modal">
    <div class="modal-box bg-base-200 max-w-xs">
      <h3 class="text-lg font-bold mb-4">New Configuration</h3>
      <div class="space-y-1" id="type-options">
        <button class="btn btn-ghost btn-block justify-start gap-3" data-type="preview">
          <span>&#127760;</span><div class="text-left"><div class="text-sm">Preview</div><div class="text-xs opacity-50">Web dev server with proxy</div></div>
        </button>
        <button class="btn btn-ghost btn-block justify-start gap-3" data-type="script">
          <span>&#9000;</span><div class="text-left"><div class="text-sm">Script</div><div class="text-xs opacity-50">Run a shell command</div></div>
        </button>
        <button class="btn btn-ghost btn-block justify-start gap-3" data-type="test">
          <span>&#10003;</span><div class="text-left"><div class="text-sm">Test</div><div class="text-xs opacity-50">Run test suite</div></div>
        </button>
        <button class="btn btn-ghost btn-block justify-start gap-3" data-type="custom">
          <span>&#9881;</span><div class="text-left"><div class="text-sm">Custom</div><div class="text-xs opacity-50">Generic configuration</div></div>
        </button>
      </div>
      <div class="modal-action"><button class="btn btn-sm btn-ghost" onclick="document.getElementById('type-dialog').close()">Cancel</button></div>
    </div>
    <form method="dialog" class="modal-backdrop"><button>close</button></form>
  </dialog>

  <script>
    // ── State ──
    let configs = [];
    let selectedId = null;
    let states = {};
    let saveTimer = null;
    let outputPollTimer = null;
    let lastOutputIndex = 0;
    const DEBOUNCE_MS = 600;
    const OUTPUT_POLL_MS = 800;

    // ── xterm.js terminal ──
    const term = new window.Terminal({
      theme: { background: '#0d0e17', foreground: '#c8d3f5', cursor: '#43e6c3' },
      fontSize: 13,
      fontFamily: "'JetBrains Mono', 'Consolas', 'Courier New', monospace",
      cursorBlink: false,
      disableStdin: true,
      scrollback: 5000,
      convertEol: true,
    });
    const fitAddon = new window.FitAddon.FitAddon();
    term.loadAddon(fitAddon);

    // Mount terminal after DOM ready
    window.addEventListener('DOMContentLoaded', () => {
      const container = document.getElementById('terminal-container');
      term.open(container);
      fitAddon.fit();
      term.writeln('\x1b[90m— Select a configuration and click Run —\x1b[0m');
    });
    window.addEventListener('resize', () => fitAddon.fit());

    // ── API helpers ──
    async function api(path) { return (await fetch(path)).json(); }

    // ── Load configs ──
    async function loadConfigs() {
      const data = await api('/api/run-config/list');
      configs = data.configurations || [];
      selectedId = selectedId || data.selected_id;
      renderList();
      if (selectedId) showEditor(selectedId);
    }

    // ── Poll status ──
    async function pollStatus() {
      const data = await api('/api/run-config/status');
      states = data.states || {};
      renderList();
      updateActions();
    }

    // ── Poll output ──
    async function pollOutput() {
      if (!selectedId) return;
      try {
        const data = await api(`/api/run-config/output?id=${selectedId}&since=${lastOutputIndex}`);
        const lines = data.lines || [];
        for (const line of lines) {
          if (line.stream === 'stderr') {
            term.writeln(`\x1b[33m${line.text}\x1b[0m`);
          } else {
            term.writeln(line.text);
          }
          lastOutputIndex = line.index + 1;
        }
      } catch (e) { /* ignore polling errors */ }
    }

    function startOutputPoll() {
      stopOutputPoll();
      outputPollTimer = setInterval(pollOutput, OUTPUT_POLL_MS);
    }
    function stopOutputPoll() {
      if (outputPollTimer) { clearInterval(outputPollTimer); outputPollTimer = null; }
    }

    // ── Render config list ──
    function renderList() {
      const el = document.getElementById('config-list');
      if (!configs.length) {
        el.innerHTML = '<div class="text-center text-xs text-base-content/50 py-8">No configurations. Click + to create.</div>';
        return;
      }
      el.innerHTML = configs.map(c => {
        const state = states[c.id] || 'idle';
        const active = c.id === selectedId ? 'active' : '';
        const icon = { preview:'&#127760;', script:'&#9000;', test:'&#10003;', custom:'&#9881;' }[c.type] || '&#9881;';
        const statusDot = (state === 'running' || state === 'starting' || state === 'before_run')
          ? `<span class="status-dot ${state === 'running' ? 'running' : 'starting'}"></span>` : '';
        return `<div class="config-item flex items-center gap-2 px-3 py-2 rounded-lg cursor-pointer border border-transparent hover:bg-base-300 transition-colors ${active}" data-id="${c.id}">
          <span class="text-sm">${icon}</span>
          <div class="flex-1 min-w-0">
            <div class="text-sm font-medium text-base-content truncate">${esc(c.name)}</div>
            <div class="text-xs text-base-content/40">${c.type}${state !== 'idle' ? ' · '+state : ''}</div>
          </div>
          ${statusDot}
        </div>`;
      }).join('');
      el.querySelectorAll('.config-item').forEach(item => {
        item.onclick = () => { selectedId = item.dataset.id; renderList(); showEditor(selectedId); switchOutput(); };
      });
    }

    function esc(s) { const d = document.createElement('div'); d.textContent = s||''; return d.innerHTML; }

    // ── Show editor ──
    function showEditor(id) {
      const c = configs.find(x => x.id === id);
      if (!c) return;
      document.getElementById('editor-empty').classList.add('hidden');
      document.getElementById('editor-form').classList.remove('hidden');
      document.getElementById('f-name').value = c.name || '';
      document.getElementById('f-command').value = c.command || '';
      document.getElementById('f-workdir').value = c.working_directory || '';
      const isPreview = c.type === 'preview';
      document.getElementById('field-url').classList.toggle('hidden', !isPreview);
      document.getElementById('field-host').classList.toggle('hidden', !isPreview);
      document.getElementById('row-autorefresh').classList.toggle('hidden', !isPreview);
      if (isPreview && c.preview) {
        document.getElementById('f-url').value = c.preview.url || '';
        document.getElementById('f-host').value = c.preview.host_header || '';
        document.getElementById('t-autorefresh').checked = c.preview.auto_refresh !== false;
      }
      document.getElementById('t-parallel').checked = c.allow_parallel === true;
      renderEnvVars(c.environment_variables || {});
      renderTasks(c.before_run_tasks || []);
      updateActions();
    }

    // ── Switch output to selected config ──
    function switchOutput() {
      term.clear();
      lastOutputIndex = 0;
      // Load existing output for this config
      pollOutput();
      startOutputPoll();
    }

    // ── Update action buttons ──
    function updateActions() {
      const state = states[selectedId] || 'idle';
      const active = ['running','starting','before_run','stopping'].includes(state);
      document.getElementById('btn-run').classList.toggle('hidden', active);
      document.getElementById('btn-stop').classList.toggle('hidden', !active);
      const statusEl = document.getElementById('output-status');
      if (state !== 'idle') {
        statusEl.classList.remove('hidden');
        statusEl.textContent = `Status: ${state}`;
        statusEl.className = `px-4 py-2 border-t border-base-300 text-xs ${state === 'running' ? 'text-success' : state === 'stopped' ? 'text-base-content/40' : 'text-warning'}`;
      } else {
        statusEl.classList.add('hidden');
      }
    }

    // ── Env vars ──
    function renderEnvVars(vars) {
      const el = document.getElementById('env-list');
      const entries = Object.entries(vars);
      el.innerHTML = entries.map(([k,v],i) => `<div class="flex gap-1 items-center">
        <input class="input input-bordered input-xs bg-base-300 font-mono flex-1" value="${esc(k)}" placeholder="KEY" data-ek="${i}">
        <input class="input input-bordered input-xs bg-base-300 font-mono flex-1" value="${esc(v)}" placeholder="value" data-ev="${i}">
        <button class="btn btn-ghost btn-xs text-error" data-er="${i}">&#215;</button>
      </div>`).join('');
      el.querySelectorAll('[data-er]').forEach(b => b.onclick = () => {
        const c = configs.find(x=>x.id===selectedId); if(!c) return;
        const keys = Object.keys(c.environment_variables||{});
        delete c.environment_variables[keys[parseInt(b.dataset.er)]];
        renderEnvVars(c.environment_variables);
        scheduleSave('environment_variables', JSON.stringify(c.environment_variables));
      });
      el.querySelectorAll('input').forEach(inp => inp.onblur = saveEnvVars);
    }
    function saveEnvVars() {
      const rows = document.querySelectorAll('#env-list > div');
      const vars = {};
      rows.forEach(r => { const k=r.querySelector('[data-ek]').value.trim(), v=r.querySelector('[data-ev]').value; if(k) vars[k]=v; });
      const c = configs.find(x=>x.id===selectedId); if(c) c.environment_variables=vars;
      scheduleSave('environment_variables', JSON.stringify(vars));
    }

    // ── Tasks ──
    function renderTasks(tasks) {
      const el = document.getElementById('task-list');
      el.innerHTML = tasks.map((t,i) => `<div class="flex items-center gap-2 bg-base-300 rounded px-2 py-1">
        <input type="checkbox" class="checkbox checkbox-xs checkbox-primary" ${t.enabled!==false?'checked':''} data-tt="${i}">
        <span class="flex-1 text-xs font-mono truncate text-base-content/80">${esc(t.command)}</span>
        <button class="btn btn-ghost btn-xs text-error" data-tr="${i}">&#215;</button>
      </div>`).join('');
      el.querySelectorAll('[data-tt]').forEach(cb => cb.onchange = () => {
        const c=configs.find(x=>x.id===selectedId); if(c&&c.before_run_tasks[parseInt(cb.dataset.tt)]) {
          c.before_run_tasks[parseInt(cb.dataset.tt)].enabled=cb.checked;
          scheduleSave('before_run_tasks',JSON.stringify(c.before_run_tasks));
        }
      });
      el.querySelectorAll('[data-tr]').forEach(b => b.onclick = () => {
        const c=configs.find(x=>x.id===selectedId); if(!c) return;
        c.before_run_tasks.splice(parseInt(b.dataset.tr),1);
        renderTasks(c.before_run_tasks);
        scheduleSave('before_run_tasks',JSON.stringify(c.before_run_tasks));
      });
    }

    // ── Auto-save ──
    function scheduleSave(field, value) {
      clearTimeout(saveTimer);
      saveTimer = setTimeout(() => {
        if (!selectedId) return;
        api(`/api/run-config/update?id=${selectedId}&field=${field}&value=${encodeURIComponent(value)}`);
      }, DEBOUNCE_MS);
    }

    // ── Event bindings ──
    ['f-name','f-command','f-workdir','f-url','f-host'].forEach(id => {
      document.getElementById(id).onblur = function() {
        if (!selectedId) return;
        const map = {'f-name':'name','f-command':'command','f-workdir':'working_directory','f-url':'preview.url','f-host':'preview.host_header'};
        scheduleSave(map[id], this.value);
      };
    });
    document.getElementById('t-parallel').onchange = function() { scheduleSave('allow_parallel', this.checked?'true':'false'); };
    document.getElementById('t-autorefresh').onchange = function() { scheduleSave('preview.auto_refresh', this.checked?'true':'false'); };
    document.getElementById('btn-add-env').onclick = () => {
      const c=configs.find(x=>x.id===selectedId); if(!c) return;
      if(!c.environment_variables) c.environment_variables={};
      c.environment_variables['']=''
      renderEnvVars(c.environment_variables);
    };
    document.getElementById('btn-add-task').onclick = () => {
      const cmd = prompt('Enter before-run command:'); if(!cmd) return;
      const c=configs.find(x=>x.id===selectedId); if(!c) return;
      if(!c.before_run_tasks) c.before_run_tasks=[];
      c.before_run_tasks.push({command:cmd,enabled:true});
      renderTasks(c.before_run_tasks);
      scheduleSave('before_run_tasks',JSON.stringify(c.before_run_tasks));
    };
    document.getElementById('btn-run').onclick = async () => {
      if(!selectedId) return;
      term.clear(); lastOutputIndex=0;
      term.writeln('\x1b[90m— Starting...\x1b[0m');
      await api(`/api/run-config/start?id=${selectedId}`);
      startOutputPoll();
      pollStatus();
    };
    document.getElementById('btn-stop').onclick = async () => {
      if(!selectedId) return;
      await api(`/api/run-config/stop?id=${selectedId}`);
      pollStatus();
    };
    document.getElementById('btn-clear').onclick = async () => {
      if(!selectedId) return;
      term.clear(); lastOutputIndex=0;
      await api(`/api/run-config/clear-output?id=${selectedId}`);
    };
    document.getElementById('btn-delete').onclick = async () => {
      if(!selectedId||!confirm('Delete this configuration?')) return;
      await api(`/api/run-config/delete?id=${selectedId}`);
      selectedId=null;
      document.getElementById('editor-form').classList.add('hidden');
      document.getElementById('editor-empty').classList.remove('hidden');
      term.clear();
      await loadConfigs();
    };
    document.getElementById('btn-add').onclick = () => document.getElementById('type-dialog').showModal();
    document.querySelectorAll('#type-options button').forEach(opt => {
      opt.onclick = async () => {
        document.getElementById('type-dialog').close();
        const data = await api(`/api/run-config/create?type=${opt.dataset.type}`);
        if(data.success&&data.configuration) { configs.push(data.configuration); selectedId=data.configuration.id; renderList(); showEditor(selectedId); switchOutput(); }
      };
    });

    // ── Init ──
    loadConfigs();
    setInterval(pollStatus, 3000);
    startOutputPoll();

    // ── Resize handle drag logic ──
    const resizeHandle = document.getElementById('resize-handle');
    const outputPanel = document.getElementById('output-panel');
    let isResizing = false;

    resizeHandle.addEventListener('mousedown', (e) => {
      isResizing = true;
      document.body.style.cursor = 'col-resize';
      document.body.style.userSelect = 'none';
      e.preventDefault();
    });

    document.addEventListener('mousemove', (e) => {
      if (!isResizing) return;
      const containerRight = document.body.clientWidth;
      const newWidth = containerRight - e.clientX;
      if (newWidth >= 200 && newWidth <= 800) {
        outputPanel.style.width = newWidth + 'px';
        fitAddon.fit();
      }
    });

    document.addEventListener('mouseup', () => {
      if (isResizing) {
        isResizing = false;
        document.body.style.cursor = '';
        document.body.style.userSelect = '';
        fitAddon.fit();
      }
    });
  </script>
</body>
</html>

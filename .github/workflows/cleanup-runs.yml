name: Cleanup Old Workflow Runs

on:
  schedule:
    # Run every Monday at 03:00 UTC
    - cron: '0 3 * * 1'
  workflow_dispatch: # Allow manual trigger

permissions:
  actions: write

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Delete workflow runs older than 14 days
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          echo "Fetching old workflow runs (>14 days)..."
          CUTOFF=$(date -d '14 days ago' -u +%Y-%m-%dT%H:%M:%SZ)
          
          # Get all runs older than cutoff
          RUNS=$(gh run list --repo ${{ github.repository }} --limit 200 --json databaseId,createdAt \
            | jq -r ".[] | select(.createdAt < \"$CUTOFF\") | .databaseId")
          
          COUNT=$(echo "$RUNS" | grep -c . || true)
          echo "Found $COUNT runs to delete"
          
          for id in $RUNS; do
            gh run delete "$id" --repo ${{ github.repository }} 2>/dev/null && \
              echo "Deleted run $id" || true
          done
          
          echo "Cleanup complete"

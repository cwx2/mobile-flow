name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  # Create the release first so build jobs can upload assets to it
  create-release:
    runs-on: ubuntu-latest
    steps:
      - name: Delete existing release (if any)
        env:
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN }}
        run: |
          gh release delete "${{ github.ref_name }}" \
            --repo cwx2/mobile-flow \
            --yes --cleanup-tag=false 2>/dev/null || true

      - name: Create Release on public repo
        env:
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --repo cwx2/mobile-flow \
            --title "${{ github.ref_name }}" \
            --notes "## Downloads

          | Platform | File |
          |----------|------|
          | 🤖 Android | \`mobileflow-app.apk\` |
          | 🪟 Windows | \`mobileflow-agent-windows.exe\` |
          | 🍎 macOS | \`mobileflow-agent-macos\` |
          | 🐧 Linux | \`mobileflow-agent-linux\` |

          ### Quick Start
          1. Download the Agent for your desktop OS
          2. Download the APK for your Android phone
          3. Install an AI CLI tool (\`npm i -g @anthropic-ai/claude-code\`)
          4. Launch Agent → Open App → Connect → Code!"

  build-agent:
    needs: create-release
    strategy:
      matrix:
        include:
          - os: windows-latest
            artifact: mobileflow-agent-windows.exe
            rename_from: mobileflow-agent.exe
          - os: macos-latest
            artifact: mobileflow-agent-macos
            rename_from: mobileflow-agent
          - os: ubuntu-latest
            artifact: mobileflow-agent-linux
            rename_from: mobileflow-agent

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: |
            agent/pyproject.toml
            protocol/pyproject.toml

      - name: Install dependencies
        working-directory: agent
        run: |
          pip install -e ../protocol
          pip install -e .
          pip install pyinstaller

      - name: Build with PyInstaller
        working-directory: agent
        run: python build/scripts/build.py

      - name: Rename artifact with platform suffix
        working-directory: agent/dist
        shell: bash
        run: mv "${{ matrix.rename_from }}" "${{ matrix.artifact }}"

      # Upload directly to the release — no artifact storage needed
      - name: Upload to Release
        env:
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN }}
        shell: bash
        run: |
          gh release upload "${{ github.ref_name }}" \
            "agent/dist/${{ matrix.artifact }}" \
            --repo cwx2/mobile-flow \
            --clobber

  build-android:
    needs: create-release
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.38.5'
          channel: 'stable'
          cache: true

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('app/android/**/*.gradle*', 'app/pubspec.lock') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Build APK
        working-directory: app
        run: |
          flutter pub get
          flutter build apk --release

      - name: Rename APK
        working-directory: app
        run: mv build/app/outputs/flutter-apk/app-release.apk build/app/outputs/flutter-apk/mobileflow-app.apk

      # Upload directly to the release — no artifact storage needed
      - name: Upload to Release
        env:
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN }}
        run: |
          gh release upload "${{ github.ref_name }}" \
            "app/build/app/outputs/flutter-apk/mobileflow-app.apk" \
            --repo cwx2/mobile-flow \
            --clobber

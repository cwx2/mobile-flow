name: Encoding Check

on:
  push:
    branches: [main]
  pull_request:

jobs:
  encoding-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Run encoding guard
        run: python scripts/check_encoding.py --all
